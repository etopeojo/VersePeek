name: Feedback
description: Report a bug, rough edge, or feature idea for VersePeek
title: "[Feedback]: "
labels: ["feedback"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of feedback is this?
      options:
        - Bug
        - Idea / feature request
        - Usability / UX
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: What happened, what you expected, or what you’d like to see.
      placeholder: Steps, screenshots, OS (Linux/Windows), and translation if relevant…
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: e.g. Ubuntu 22.04, Windows 11
  - type: input
    id: version
    attributes:
      label: VersePeek version
      placeholder: e.g. 1.0.0
